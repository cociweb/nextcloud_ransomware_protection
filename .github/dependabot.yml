version: 2
updates:
- package-ecosystem: 'github-actions'
  directory: '/'
  schedule:
    interval: 'daily'
- package-ecosystem: composer
  directory: "/"
  schedule:
    interval: daily
    time: "03:00"
    timezone: Europe/Budapest
  open-pull-requests-limit: 20
  labels:
  - 3. to review
  - dependencies
